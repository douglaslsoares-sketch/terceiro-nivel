<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leve isso com você | Terceiro Nível</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F8F8F8;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 400px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    img {
      width: 220px;
      margin: 20px auto;
    }

    .passos {
      font-size: 14px;
      color: #444;
      margin-top: 20px;
      line-height: 1.4;
    }

    .final {
      margin-top: 30px;
      font-size: 15px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Leve isso com você</h1>

    <p>
      Deixe o QR do projeto<br>
      na tela do seu celular.
    </p>

    <p>
      Quando surgir uma conversa,<br>
      é só mostrar.
    </p>

    <img src="assets/img/qr.png" alt="QR Code Terceiro Nível">

    <div class="passos">
      Abra a imagem do QR<br>
      salve no celular<br>
      e coloque como tela de bloqueio
    </div>

    <p class="final">
      Às vezes, uma conversa simples<br>
      já muda a forma de ver.
    </p>

  </div>

</body>
</html>
