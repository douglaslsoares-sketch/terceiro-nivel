<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terceiro Nível</title>

<style>
:root{
  --verde:#3A5A40;
  --fundo:#F8F8F8;
  --texto:#111;
  --cinza:#666;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--fundo);
  color:var(--texto);
  line-height:1.6;
}

/* ===== HEADER ===== */

.header{
  background:var(--verde);
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 24px;
  position:fixed;
  width:100%;
  top:0;
  left:0;
}

.header img{
  height:32px;
}

.header a{
  color:white;
  text-decoration:none;
  font-size:14px;
  letter-spacing:1px;
}

/* ===== MAIN ===== */

.main{
  padding-top:120px;
  max-width:900px;
  margin:0 auto;
  padding-left:20px;
  padding-right:20px;
}

/* ===== CARD PRINCIPAL ===== */

.card{
  text-align:center;
  cursor:pointer;
  padding:80px 20px;
  border-top:2px solid var(--texto);
  border-bottom:2px solid var(--texto);
}

.card h1{
  font-size:42px;
  letter-spacing:2px;
  font-weight:800;
}

/* ===== CONTEÚDO ===== */

.conteudo{
  display:none;
  margin-top:60px;
  font-size:18px;
}

.conteudo h2{
  margin-top:40px;
  font-size:22px;
}

.conteudo p{
  margin-top:10px;
  color:var(--cinza);
}
</style>
</head>
<body>

<header class="header">
  <img src="simbolo-branco.png" alt="Símbolo Terceiro Nível">
  <a href="#">Ideias em circulação</a>
</header>

<main class="main">

  <div class="card" onclick="abrirConteudo()">
    <h1>COMO O PAÍS FUNCIONA</h1>
  </div>

  <div id="conteudo" class="conteudo">

    <h2>Primeiro nível</h2>
    <p>Mercado. Onde decisões econômicas são tomadas hoje.</p>

    <h2>Segundo nível</h2>
    <p>Governo. Onde decisões viram leis, políticas e orçamento.</p>

    <h2>Terceiro nível</h2>
    <p>Trabalho e consumo. Onde está a maioria das pessoas.  
    Quem sustenta tudo isso.</p>

  </div>

</main>

<script>
function abrirConteudo(){
  const bloco = document.getElementById("conteudo");
  if(bloco.style.display === "block"){
    bloco.style.display = "none";
  } else {
    bloco.style.display = "block";
  }
}
</script>

</body>
</html>
