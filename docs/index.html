<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TMSS1F9VS4"></script>

  <style>

  :root{
    --verde:#3A5A40;
    --fundo:#F8F8F8;
    --texto:#111111;
    --cinza:#666666;
  }

  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
  }

  html{
    scroll-behavior:smooth;
    scroll-snap-type:y mandatory;
  }

  body{
    font-family:Arial, sans-serif;
    background:var(--fundo);
    color:var(--texto);
    text-align:center;
  }

  .section{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    scroll-snap-align:start;
    padding:32px 20px;
  }

  .container{
    width:100%;
    max-width:700px;
    margin:0 auto;
  }

  .fala-pequena{
    font-size:28px;
    color:var(--cinza);
    margin-bottom:10px;
    line-height:1.3;
  }

  .fala-grande{
    font-size:52px;
    font-weight:700;
    line-height:1.08;
    margin-bottom:18px;
  }

  @media (max-width:600px){
    .fala-grande{
      font-size:32px;
      line-height:1.15;
    }
  }

  .fala-media{
    font-size:34px;
    font-weight:700;
    line-height:1.2;
    margin-bottom:16px;
  }

  .texto{
    font-size:30px;
    line-height:1.35;
    max-width:620px;
    margin:0 auto 12px;
  }

  .lista-curta{
    font-size:34px;
    line-height:1.7;
    font-weight:700;
    margin-bottom:12px;
  }

  .grafico-fluxo,
  .grafico-full{
    width:100%;
    height:auto;
    display:block;
    margin:0 auto;
  }

  .microfrase{
    margin-top:14px;
    font-size:16px;
    color:#777;
  }

  .transicao{
    margin-top:24px;
    font-size:18px;
    color:var(--verde);
    opacity:0.85;
    animation:sobe-desce 1.6s infinite;
  }

  @keyframes sobe-desce{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(8px); }
  }

  /* BOTÃO TOPO */
  .botao-topo{
    display:inline-block;
    margin-top:16px;
    padding:16px 28px;
    background:#3A5A40;
    color:#fff;
    border-radius:30px;
    text-decoration:none;
    font-size:16px;
    font-weight:600;
  }

  /* BOTÃO FINAL */
  .botao-final{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:40px;
    padding:14px;
    background:transparent;
    border:1px solid #3A5A40;
    color:#3A5A40;
    border-radius:10px;
    text-decoration:none;
    font-size:16px;
    font-weight:600;
    max-width:320px;
    margin-left:auto;
    margin-right:auto;
  }

  .botao-final svg{
    width:20px;
    height:20px;
    fill:#3A5A40;
  }

  </style>
</head>

<body>

<!-- TELA INICIAL -->
<section class="section">
  <div class="container">

    <div class="fala-pequena">
      Seu dinheiro não é seu.
    </div>

    <div class="fala-grande">
      Por que o dinheiro vai<br>e não volta?
    </div>

    <img src="assets/img/vai-nao-volta.png" class="grafico-fluxo">

    <a href="https://wa.me/5543991444266" target="_blank" class="botao-topo">
      Continue no WhatsApp →
    </a>

  </div>
</section>

<!-- GRÁFICO -->
<section class="section">
  <div class="container">

    <div class="fala-media">
      Foi aqui que eu parei.
    </div>

    <img src="assets/img/grafico-acd.png" class="grafico-full">

    <div class="microfrase">
      Orçamento federal executado (pago) 2025 · Fonte: Auditoria Cidadã da Dívida
    </div>

    <div class="transicao">segue ↓</div>

  </div>
</section>

<!-- IMPACTO FINAL -->
<section class="section">
  <div class="container">

    <div class="texto">
      É daí que vêm as consequências.
    </div>

    <div class="texto">—</div>

    <div class="fala-pequena">
      A partir daqui, você vai ver isso no dia a dia.
    </div>

    <a href="https://wa.me/5543991444266" target="_blank" class="botao-final">
      <svg viewBox="0 0 24 24">
        <path d="M20.52 3.48A11.82 11.82 0 0 0 12.02 0C5.4 0 .02 5.38.02 12c0 2.12.56 4.2 1.62 6.04L0 24l6.14-1.6A11.94 11.94 0 0 0 12.02 24c6.62 0 12-5.38 12-12 0-3.2-1.25-6.2-3.5-8.52z"/>
      </svg>
      Ver isso no WhatsApp →
    </a>

  </div>
</section>

</body>
</html>
