<style>
:root{
  --verde:#3A5A40;
  --fundo:#F8F8F8;
  --texto:#111111;
  --cinza:#666666;
  --cinza-claro:#8A8A8A;
  --branco:#FFFFFF;
}

/* ========================= */
/* AJUSTES EDITORIAIS GERAIS */
/* ========================= */

h1{
  font-size:72px;
  line-height:0.9;
  letter-spacing:1.5px;
  font-weight:800;
  margin-bottom:40px; /* ↑ mais respiro */
  text-transform:uppercase;
}

.hero-subtitulo{
  max-width:620px; /* ↓ mais estreito */
  margin:0 auto;
  font-size:36px; /* ↓ leve redução (mais elegante) */
  line-height:1.15;
  letter-spacing:0.4px;
  margin-bottom:28px;
}

.hero-linha{
  width:92px;
  height:4px;
  background:var(--verde);
  margin:28px auto 20px; /* ajuste fino */
  border-radius:999px;
}

.hero-resposta{
  max-width:480px; /* ↓ melhora leitura */
  margin:0 auto;
  font-size:15px;
  line-height:1.6;
  color:var(--cinza);
  margin-bottom:28px;
}

.hero-rodape{
  margin-top:28px;
  font-family:'League Spartan', sans-serif;
  font-size:12px;
  letter-spacing:1.8px;
  text-transform:uppercase;
  color:var(--cinza-claro);
  opacity:0.75;
}

/* ========================= */
/* TABLET */
/* ========================= */

@media (max-width:860px){
  h1{
    font-size:56px;
  }

  .hero-subtitulo{
    font-size:30px;
  }
}

/* ========================= */
/* MOBILE (O MAIS IMPORTANTE) */
/* ========================= */

@media (max-width:640px){

  .section{
    padding:44px 18px; /* ↓ mais compacto */
  }

  h1{
    font-size:36px;
    line-height:0.95;
    letter-spacing:1px;
    margin-bottom:16px; /* aproxima da frase */
  }

  .hero-subtitulo{
    font-size:24px;
    line-height:1.2;
    letter-spacing:0.3px;
    margin-bottom:22px;
    max-width:300px; /* chave do mobile */
  }

  .hero-linha{
    width:60px;
    margin:20px auto 16px;
  }

  .hero-resposta{
    font-size:13px;
    line-height:1.5;
    max-width:280px;
    margin-bottom:20px;
  }

  .hero-rodape{
    margin-top:20px;
    font-size:11px;
    letter-spacing:1.5px;
  }
}
</style>
