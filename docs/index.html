<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terceiro Nível</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TMSS1F9VS4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TMSS1F9VS4');
  </script>

  <style>
  :root{
    --verde:#3A5A40;
    --fundo:#F8F8F8;
    --texto:#111111;
    --cinza:#666666;
  }

  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
  }

  html{
    scroll-behavior:smooth;
    scroll-snap-type:y mandatory;
  }

  body{
    font-family:Arial, sans-serif;
    background:var(--fundo);
    color:var(--texto);
    text-align:center;
  }

  .section{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    scroll-snap-align:start;
    padding:32px 20px;
  }

  .container{
    width:100%;
    max-width:700px;
    margin:0 auto;
  }

  .fala-pequena{
    font-size:28px;
    color:var(--cinza);
    margin-bottom:10px;
    line-height:1.3;
  }

  .fala-grande{
    font-size:52px;
    font-weight:700;
    line-height:1.08;
  }

  .fala-media{
    font-size:34px;
    font-weight:700;
    line-height:1.2;
  }

  .texto{
    font-size:30px;
    line-height:1.35;
    max-width:620px;
    margin:0 auto;
  }

  .lista-curta{
    font-size:34px;
    line-height:1.7;
    font-weight:700;
  }

  .imagem-base{
    max-width:100%;
    height:auto;
    display:block;
    margin:0 auto;
  }

  .emblema{
    width:78px;
    display:block;
    margin:22px auto 26px;
  }

  .botao{
    display:inline-block;
    padding:16px 30px;
    background:var(--verde);
    color:#fff;
    text-decoration:none;
    border-radius:30px;
    font-size:16px;
    transition:opacity 0.2s ease;
  }

  .botao:hover{
    opacity:0.88;
  }

  .rodape{
    margin-top:40px;
    font-size:13px;
    color:var(--cinza);
    line-height:1.6;
  }

  .seta-scroll{
    margin-top:34px;
    font-size:28px;
    color:var(--verde);
    opacity:0.8;
    animation:sobe-desce 1.6s infinite;
  }

  @keyframes sobe-desce{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(8px); }
  }

  .section-imagem{
    padding:0;
    background:var(--fundo);
  }

  .section-imagem .container{
    width:100%;
    max-width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0;
  }

  .section-imagem img{
    width:100%;
    max-width:100%;
    max-height:100vh;
    object-fit:contain;
    display:block;
    margin:0 auto;
  }

  .section-imagem.destaque .container{
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .section-imagem.destaque img{
    width:100%;
    max-width:100%;
    max-height:92vh;
    object-fit:contain;
  }

  .imagem-fluxo{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:0;
  }

  .imagem-fluxo .container{
    width:100%;
    max-width:480px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .grafico-fluxo{
    width:100%;
    height:auto;
    display:block;
  }

  .microfrase{
    margin-top:18px;
    margin-bottom:12px;
    font-size:16px;
    line-height:1.4;
    color:var(--cinza);
  }

  .botao-entender{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:14px 22px;
    border:1px solid #3A5A40;
    border-radius:999px;
    text-decoration:none;
    color:#3A5A40;
    font-size:0.98rem;
    font-weight:600;
    letter-spacing:0.01em;
    background:transparent;
    transition:all 0.2s ease;
  }

  .botao-entender:hover{
    background:#3A5A40;
    color:#F8F8F8;
  }

  @media (max-width: 768px){
    .fala-pequena{
      font-size:24px;
    }

    .fala-grande{
      font-size:42px;
    }

    .fala-media{
      font-size:30px;
    }

    .texto{
      font-size:24px;
    }

    .lista-curta{
      font-size:28px;
    }

    .section{
      padding:28px 18px;
    }
  }

  @media (max-width: 600px){
    .section-imagem img{
      width:100%;
      max-height:100vh;
      object-fit:contain;
    }

    .imagem-fluxo .container{
      max-width:420px;
    }

    .microfrase{
      font-size:15px;
      margin-top:16px;
      margin-bottom:10px;
    }

    .botao-entender{
      font-size:0.96rem;
      padding:13px 20px;
    }
  }
  </style>
</head>

<body>

<!-- TELA 1 -->
<section class="section">
  <div class="container">
    <div class="fala-grande">Por que falta dinheiro?</div>
    <div class="seta-scroll">↓</div>
  </div>
</section> 

<!-- TELA 2 -->
<section class="section imagem-fluxo">
  <div class="container">
    <img src="assets/img/vai-nao-volta.png" alt="Dinheiro público vai para o setor financeiro e não volta" class="grafico-fluxo">

   

    <a href="https://whatsapp.com/channel/0029VbCoPo33bbV9BoaRjo2f" class="botao-entender" target="_blank" rel="noopener">
      ver o porquê
    </a>
  </div>
</section>

</body>
</html>
