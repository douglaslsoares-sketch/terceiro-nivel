<style>

:root{
--verde:#3A5A40;
--fundo:#F8F8F8;
--texto:#111;
--cinza:#666;
}

html{
scroll-behavior:smooth;
scroll-snap-type:y mandatory;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--fundo);
color:var(--texto);
}

/* estrutura geral */
.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
scroll-snap-align:start;
max-width:900px;
margin:auto;
}

/* tipografia */
h1{
font-size:42px;
margin:0 0 10px 0;
letter-spacing:2px;
}

.sub{
font-size:18px;
color:var(--cinza);
margin-bottom:40px;
}

.frase{
font-size:26px;
line-height:1.4;
max-width:600px;
margin-bottom:50px;
}

/* assinatura visual */
.pontos{
font-size:28px;
letter-spacing:10px;
color:var(--verde);
margin-bottom:40px;
}

/* botão */
.botao{
display:inline-block;
padding:16px 28px;
background:var(--verde);
color:#fff;
text-decoration:none;
border-radius:30px;
font-size:16px;
transition:0.2s;
}

.botao:hover{
opacity:0.85;
}

/* rodapé */
.rodape{
font-size:14px;
color:var(--cinza);
max-width:400px;
line-height:1.6;
}

</style>

</head>

</div>

<div class="pontos">...</div>

<a class="botao" 
href="https://whatsapp.com/channel/0029Vb7GLPv2ER6ZugDYMO2y" 
target="_blank">
Entrar no canal do WhatsApp
</a>

</section>

<!-- TELA 3 -->
<section class="section">

<div class="rodape">

<p><strong>Terceiro Nível</strong></p>

<p>

que organiza a vida em sociedade.
</p>

<p>

</p>

</div>

</section>
