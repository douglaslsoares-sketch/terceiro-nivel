<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sou Terceiro Nível</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      background:#ffffff;
      font-family:Arial, sans-serif;
      color:#111;
    }

    .section-camiseta{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
    }

    .bloco-camiseta{
      width:100%;
      max-width:520px;
      text-align:center;
    }

    .bloco-camiseta img{
      width:100%;
      max-width:420px;
      height:auto;
      display:block;
      margin:0 auto 24px auto;
    }

    .bloco-camiseta h1{
      font-size:32px;
      line-height:1.1;
      margin-bottom:16px;
      letter-spacing:1px;
    }

    .bloco-camiseta p{
      font-size:18px;
      line-height:1.5;
      max-width:360px;
      margin:0 auto;
    }

    @media (max-width:480px){
      .section-camiseta{
        padding:28px 16px;
      }

      .bloco-camiseta h1{
        font-size:26px;
      }

      .bloco-camiseta p{
        font-size:16px;
      }
    }
  </style>
</head>
<body>

  <section class="section-camiseta">
    <div class="bloco-camiseta">
      <img src="assets/img/sou-terceiro-nivel.png" alt="Estampa Sou Terceiro Nível">
      <h1>SOU TERCEIRO NÍVEL</h1>
      <p>Tem gente que aparece. Tem gente que decide. Tem gente que faz tudo funcionar.</p>
    </div>
  </section>

</body>
</html>
